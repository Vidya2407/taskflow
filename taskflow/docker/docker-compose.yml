services:

  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"